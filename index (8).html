<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fitness Check-in</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;font-family:'Noto Sans Thai',Sarabun,sans-serif;color:#fff}
.header{background:rgba(255,255,255,0.06);border-bottom:1px solid rgba(255,255,255,0.1);padding:16px 20px 0;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.badge{background:linear-gradient(135deg,#f093fb,#f5576c);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;margin-left:auto;text-align:right}
.sync{font-size:10px;margin-top:2px}
.tabs{display:flex}
.tab{flex:1;padding:9px 0;border:none;background:transparent;color:rgba(255,255,255,0.4);font-size:12px;font-family:inherit;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#f093fb;border-bottom:2px solid #f093fb;font-weight:700}
.content{padding:18px 16px;max-width:560px;margin:0 auto}
input,select{width:100%;padding:13px 14px;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;font-size:15px;font-family:inherit;outline:none;box-sizing:border-box}
input:focus{border-color:#f093fb}
.search-wrap{position:relative;margin-bottom:14px;display:flex;gap:8px;align-items:center}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%)}
.results{background:rgba(255,255,255,0.06);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);margin-bottom:14px}
.result-item{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer;display:flex;align-items:center;gap:10px}
.result-item:last-child{border-bottom:none}
.result-item:hover{background:rgba(240,147,251,0.1)}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.av-blue{background:linear-gradient(135deg,#667eea,#764ba2)}
.av-green{background:linear-gradient(135deg,#11998e,#38ef7d)}
.av-pink{background:linear-gradient(135deg,#f093fb,#f5576c)}
.item-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-sec{font-size:11px;color:rgba(255,255,255,0.4)}
.tag-done{font-size:11px;background:rgba(56,239,125,0.2);color:#38ef7d;padding:2px 8px;border-radius:8px;white-space:nowrap}
.card{background:rgba(255,255,255,0.06);border:1px solid rgba(240,147,251,0.3);border-radius:18px;padding:18px;margin-bottom:14px}
.stats{display:flex;gap:8px;margin:14px 0}
.stat{flex:1;background:rgba(255,255,255,0.05);border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:24px;font-weight:800;color:#f093fb}
.stat-label{font-size:11px;color:rgba(255,255,255,0.4)}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;margin-bottom:8px}
.btn:disabled{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);cursor:default}
.btn-sm{width:100%;padding:10px;border:1px solid rgba(255,255,255,0.2);border-radius:12px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}
.today-item{display:flex;align-items:center;gap:10px;background:rgba(56,239,125,0.08);border:1px solid rgba(56,239,125,0.2);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.all-item{display:flex;align-items:center;gap:10px;border-radius:10px;padding:11px 12px;margin-bottom:6px;cursor:pointer}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#38ef7d;color:#000;padding:12px 20px;border-radius:12px;font-weight:700;font-size:13px;z-index:999;white-space:nowrap;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.edit-box{background:rgba(255,255,255,0.05);border-radius:12px;padding:14px;margin-top:8px}
.num-ctrl{display:flex;align-items:center;gap:6px}
.num-btn{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:18px;cursor:pointer}
.num-input{flex:1;text-align:center;padding:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;font-size:16px;font-weight:700;font-family:inherit;outline:none}
.add-box{background:rgba(255,255,255,0.06);border:1px solid rgba(240,147,251,0.3);border-radius:18px;padding:18px;margin-bottom:14px}
.hidden{display:none}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="header">
  <div class="header-top">
    <span style="font-size:26px">💪</span>
    <div style="flex:1">
      <div style="font-weight:700;font-size:17px">Fitness Check-in</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.45)" id="dateLabel"></div>
    </div>
    <div class="badge">
      <div id="badge">วันนี้ 0 คน</div>
      <div class="sync" id="syncStatus">⏳ กำลังโหลด...</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <span style="font-size:11px;color:rgba(255,255,255,0.5)">วันที่:</span>

  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('checkin',this)">🏃 เช็คชื่อ</button>
    <button class="tab" onclick="switchTab('today',this)" id="todayTab">📋 วันนี้ (0)</button>
    <button class="tab" onclick="switchTab('all',this)">👥 ทั้งหมด</button>
  </div>
</div>

<div class="content">

      <div style="display:flex;gap:8px">

      </div>
    </div>

    <div class="search-wrap">
      <button onclick="toggleAdd()" id="addBtn" style="flex-shrink:0;padding:13px 16px;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;font-size:16px;cursor:pointer">➕</button>
      <div style="flex:1;position:relative">
        <input type="text" id="searchInput" placeholder="พิมพ์ชื่อสมาชิก..." oninput="onSearch(this.value)">
        <span class="search-icon">🔍</span>
      </div>
    </div>
    <div id="resultsList"></div>
    <div id="selectedCard"></div>
    <div id="notFound" class="hidden" style="text-align:center;color:rgba(255,255,255,0.3);padding:40px 0;font-size:13px"></div>
  </div>

  <div id="today" class="hidden">
    <div id="todayList"></div>
  </div>

  <div id="all" class="hidden">
    <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:12px" id="allCount"></div>
    <div id="allList"></div>
  </div>
</div>

  "โบว์ ธารทิพย์": 19,
  "โบอิ้ง": 22,
  "แบม ภิญญาพัชญ์ สุนทรดี": 18,
  "หมอบิ๊ก ท่าตูม": 20,
  "ผักบุ้ง": 2,
  "รองบอม แมนพล สุวรรณเสวก": 13,
  "บีม รวิภาสษ์ เทรนเดี่ยว": 6,
  "หมอแซนด์ ศิวายพราหมณ์": 15,
  "โซดา": 6,
  "ซัน โรจนินทร์ สินประสิทธิ์กุล": 0,
  "พี่แสง เพื่อนเฮียป้อม": 14,
  "ส้ม ศุจินทรา": 17,
  "สร้อยมุก นัชชา บุญเจริญ": 20,
  "เอมมี่ เพื่อนสร้อยมุก": 22,
  "ปิ่น ศิริรัตน์ วงศ์สกุล": 0,
  "ปาล์ม ชนกานต์": 0,
  "ปาร์ค ธรธรณ์": 0,
  "ปลื้ม ภสุ อรุณยะเดช": 29,
};

const extraMembers = [];
function getAllMembers() { return [...MEMBERS, ...extraMembers]; }

const counts = {};
getAllMembers().forEach(m => counts[m.name] = m.count);
const todayLog = {};
const logByDate = {};
let selectedDate = new Date().toISOString().slice(0,10);
let selectedMember = null;
let editMode = false;

// Init
document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
document.getElementById('dateInput').value = selectedDate;
document.getElementById('allCount').textContent = 'สมาชิก ' + getAllMembers().length + ' คน';
renderAll();
loadFromServer(selectedDate);

// Auto-refresh every 30s
setInterval(() => loadFromServer(selectedDate), 30000);

function getScriptUrl() {
  return window.location.href.split('?')[0];
}

async function loadFromServer(date) {
  document.getElementById('syncStatus').textContent = '⏳ กำลังโหลด...';
  try {
    const url = getScriptUrl() + '?action=getLog&date=' + date;
    const res = await fetch(url);
    const data = await res.json();
    if (data.log) {
      logByDate[date] = data.log;
      if (date === selectedDate) {
        Object.assign(todayLog, {});
        Object.keys(todayLog).forEach(k => delete todayLog[k]);
        Object.assign(todayLog, data.log);
        Object.entries(data.log).forEach(([name, info]) => {
          if (info.count) counts[name] = info.count;
        });
      }
      updateBadge();
      if (document.getElementById('today').style.display !== 'none') renderToday();
      if (document.getElementById('all').style.display !== 'none') renderAll();
      if (selectedMember) renderCard();
    }
    document.getElementById('syncStatus').textContent = '✓ ซิงค์แล้ว ' + new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('syncStatus').textContent = '⚠️ ไม่มีอินเทอร์เน็ต';
  }
}

async function saveToServer(name, date, time, count) {
  try {
    const url = getScriptUrl() + '?action=checkin&name=' + encodeURIComponent(name) + '&date=' + date + '&time=' + encodeURIComponent(time) + '&count=' + count;
    const res = await fetch(url);
    const data = await res.json();
    if (data.success) {
      document.getElementById('syncStatus').textContent = '✓ บันทึกแล้ว ' + new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    }
  } catch(e) {
    document.getElementById('syncStatus').textContent = '⚠️ บันทึกไม่ได้';
  }
}

function onDateChange() {
  selectedDate = document.getElementById('dateInput').value;
  const isToday = selectedDate === new Date().toISOString().slice(0,10);
  document.getElementById('retroBadge').style.display = isToday ? 'none' : '';
  Object.keys(todayLog).forEach(k => delete todayLog[k]);
  if (logByDate[selectedDate]) {
    Object.assign(todayLog, logByDate[selectedDate]);
  }
  updateBadge();
  renderAll();
  loadFromServer(selectedDate);
  if (selectedMember) renderCard();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['checkin','today','all'].forEach(t => {
    document.getElementById(t).style.display = t === name ? '' : 'none';
  });
  if (name === 'today') renderToday();
  if (name === 'all') renderAll();
}

function onSearch(q) {
  selectedMember = null; editMode = false;
  document.getElementById('selectedCard').innerHTML = '';
  document.getElementById('notFound').classList.add('hidden');
  if (!q.trim()) { document.getElementById('resultsList').innerHTML = ''; return; }
  const found = getAllMembers().filter(m => m.name.includes(q)).slice(0, 8);
  if (!found.length) {
    document.getElementById('resultsList').innerHTML = '';
    document.getElementById('notFound').textContent = 'ไม่พบชื่อ "' + q + '"';
    document.getElementById('notFound').classList.remove('hidden');
    return;
  }
  document.getElementById('resultsList').innerHTML = '<div class="results">' +
    found.map(m => {
      const done = !!todayLog[m.name];
      return '<div class="result-item" onclick="selectMember(' + JSON.stringify(m.name) + ')">' +
        '<div class="avatar ' + (done?'av-green':'av-blue') + '">' + m.name[0] + '</div>' +
        '<div style="flex:1;min-width:0"><div class="item-name">' + m.name + '</div><div class="item-sec">' + m.section + '</div></div>' +
        (done ? '<span class="tag-done">เช็คแล้ว</span>' : '<span style="font-size:12px;color:rgba(255,255,255,0.45)">' + (counts[m.name]||0) + ' ครั้ง</span>') +
        '</div>';
    }).join('') + '</div>';
}

function selectMember(name) {
  selectedMember = getAllMembers().find(m => m.name === name);
  document.getElementById('searchInput').value = name;
  document.getElementById('resultsList').innerHTML = '';
  editMode = false;
  renderCard();
}

function getRemaining(name) {
  const base = REMAINING_OVERRIDE[name] !== undefined ? REMAINING_OVERRIDE[name] : 20;
  const orig = (getAllMembers().find(m=>m.name===name)||{count:0}).count;
  const added = (counts[name]||0) - orig;
  return Math.max(0, base - added);
}

function renderCard() {
  const m = selectedMember;
  if (!m) return;
  const done = !!todayLog[m.name];
  const total = counts[m.name]||0;
  const rem = getRemaining(m.name);
  const remColor = rem<=3?'#f5576c':rem<=7?'#f093fb':'#38ef7d';
  const timeStr = todayLog[m.name] ? (todayLog[m.name].time || todayLog[m.name]) : '';

  let editHtml = '';
  if (editMode) {
    editHtml = [
      '<div class="edit-box">',
      '<div style="font-weight:700;font-size:13px;margin-bottom:10px">✏️ แก้ไขจำนวนครั้ง</div>',
      '<div style="display:flex;gap:8px;margin-bottom:10px">',
      '<div style="flex:1"><div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px">ครั้งสะสม</div>',
      '<div class="num-ctrl"><button class="num-btn" onclick="adjEdit(String.fromCharCode(101,99),-1)">-</button>',
      '<input class="num-input" type="number" id="ec" value="' + total + '">',
      '<button class="num-btn" onclick="adjEdit(String.fromCharCode(101,99),1)">+</button></div></div>',
      '<div style="flex:1"><div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px">ครั้งคงเหลือ</div>',
      '<div class="num-ctrl"><button class="num-btn" onclick="adjEdit(String.fromCharCode(101,114),-1)">-</button>',
      '<input class="num-input" type="number" id="er" value="' + rem + '">',
      '<button class="num-btn" onclick="adjEdit(String.fromCharCode(101,114),1)">+</button></div></div>',
      '</div>',
      '<div style="display:flex;gap:8px">',
      '<button onclick="editMode=false;renderCard()" style="flex:1;padding:10px;background:rgba(255,255,255,0.08);border:none;border-radius:10px;color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;font-family:inherit">ยกเลิก</button>',
      '<button onclick="saveEdit()" style="flex:2;padding:10px;background:linear-gradient(135deg,#11998e,#38ef7d);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">💾 บันทึก</button>',
      '</div></div>'
    ].join('');
  }

  document.getElementById('selectedCard').innerHTML =
    '<div class="card">' +
    '<div style="display:flex;gap:12px;align-items:center">' +
    '<div class="avatar ' + (done?'av-green':'av-pink') + '" style="width:50px;height:50px;border-radius:14px;font-size:22px">' + m.name[0] + '</div>' +
    '<div><div style="font-weight:700;font-size:15px">' + m.name + '</div><div style="font-size:12px;color:rgba(255,255,255,0.45)">' + m.section + '</div></div>' +
    '</div>' +
    '<div class="stats">' +
    '<div class="stat"><div class="stat-num">' + total + '</div><div class="stat-label">ครั้งสะสม</div></div>' +
    '<div class="stat"><div class="stat-num" style="color:' + remColor + '">' + rem + '</div><div class="stat-label">ครั้งคงเหลือ</div></div>' +
    '<div class="stat">' + (done ?
      '<div style="font-size:20px;font-weight:800;color:#38ef7d;text-align:center">✓</div><div style="font-size:11px;color:#38ef7d;text-align:center">เช็คแล้ว ' + timeStr + '</div>' :
      '<div style="font-size:20px;color:rgba(255,255,255,0.25);text-align:center">—</div><div style="font-size:11px;color:rgba(255,255,255,0.35);text-align:center">ยังไม่เช็ควันนี้</div>') +
    '</div></div>' +
    '<button class="btn" ' + (done?'disabled':'onclick="doCheckin()"') + '>' + (done?'✓ เช็คชื่อแล้ววันนี้':'✅ เช็คชื่อเทรน') + '</button>' +
    (!editMode ? '<button class="btn-sm" onclick="editMode=true;renderCard()">✏️ แก้ไขจำนวนครั้ง</button>' : '') +
    editHtml + '</div>';
}

function adjEdit(id, d) {
  const el = document.getElementById(id);
  el.value = Math.max(0, Number(el.value) + d);
}

function saveEdit() {
  if (!selectedMember) return;
  const name = selectedMember.name;
  counts[name] = Number(document.getElementById('ec').value);
  REMAINING_OVERRIDE[name] = Number(document.getElementById('er').value);
  editMode = false;
  renderCard();
  showToast('แก้ไขข้อมูล ' + name + ' แล้ว');
}

async function doCheckin() {
  if (!selectedMember || todayLog[selectedMember.name]) return;
  const name = selectedMember.name;
  const n = (counts[name]||0) + 1;
  const isToday = selectedDate === new Date().toISOString().slice(0,10);
  const timeStr = isToday ? new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) : '(ย้อนหลัง)';
  counts[name] = n;
  todayLog[name] = { time: timeStr, count: n };
  renderCard();
  updateBadge();
  showToast('เช็คชื่อ ' + name + ' สำเร็จ! ครั้งที่ ' + n);
  await saveToServer(name, selectedDate, timeStr, n);
}

function updateBadge() {
  const n = Object.keys(todayLog).length;
  document.getElementById('badge').textContent = 'วันนี้ ' + n + ' คน';
  document.getElementById('todayTab').textContent = '📋 วันนี้ (' + n + ')';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function renderToday() {
  const keys = Object.keys(todayLog);
  document.getElementById('todayList').innerHTML = !keys.length ?
    '<div style="text-align:center;padding:60px 0;color:rgba(255,255,255,0.25)"><div style="font-size:44px;margin-bottom:10px">📋</div>ยังไม่มีการเช็คชื่อวันนี้</div>' :
    keys.map((name,i) => {
      const info = todayLog[name];
      const time = info.time || info;
      return '<div class="today-item">' +
        '<div class="avatar av-green" style="width:36px;height:36px">' + (i+1) + '</div>' +
        '<div style="flex:1"><div style="font-weight:600;font-size:13px">' + name + '</div>' +
        '<div style="font-size:11px;color:rgba(255,255,255,0.4)">เช็คชื่อ ' + time + '</div></div>' +
        '<div style="font-size:13px;color:#38ef7d;font-weight:700">' + (counts[name]||0) + ' ครั้ง</div>' +
        '</div>';
    }).join('');
}

function renderAll() {
  const all = [...getAllMembers()].sort((a,b) => {
    if (todayLog[a.name] && !todayLog[b.name]) return -1;
    if (!todayLog[a.name] && todayLog[b.name]) return 1;
    return (counts[b.name]||0) - (counts[a.name]||0);
  });
  document.getElementById('allCount').textContent = 'สมาชิกทั้งหมด ' + all.length + ' คน';
  document.getElementById('allList').innerHTML = all.map(m => {
    const done = !!todayLog[m.name];
    return '<div class="all-item" style="background:' + (done?'rgba(56,239,125,0.07)':'rgba(255,255,255,0.03)') +
      ';border:1px solid ' + (done?'rgba(56,239,125,0.2)':'rgba(255,255,255,0.07)') + '" onclick="goCheckin(' + JSON.stringify(m.name) + ')">' +
      '<div class="avatar ' + (done?'av-green':'av-blue') + '" style="width:30px;height:30px;font-size:12px">' + m.name[0] + '</div>' +
      '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + m.name + '</div>' +
      '<div style="font-size:10px;color:rgba(255,255,255,0.35)">' + m.section + '</div></div>' +
      '<div style="font-size:12px;color:' + (done?'#38ef7d':'rgba(255,255,255,0.4)') + ';font-weight:700">' + (done?'✓':counts[m.name]||0) + '</div>' +
      '</div>';
  }).join('');
}

function goCheckin(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',i===0));
  ['checkin','today','all'].forEach((t,i) => document.getElementById(t).style.display = i===0?'':'none');
  selectMember(name);
}

function toggleAdd() {
  const box = document.getElementById('addBox');
  box.classList.toggle('hidden');
}

function adj(id, d) {
  const el = document.getElementById(id);
  el.value = Math.max(0, Number(el.value) + d);
}

function addMember() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return;
  const section = document.getElementById('newSection').value;
  const remaining = Number(document.getElementById('newRemaining').value);
  extraMembers.push({ name, section, count: 0 });
  REMAINING_OVERRIDE[name] = remaining;
  counts[name] = 0;
  document.getElementById('newName').value = '';
  document.getElementById('newRemaining').value = 20;
  toggleAdd();
  renderAll();
  showToast('เพิ่มสมาชิก ' + name + ' แล้ว');
}
</script>
</body>
</html>
