<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<title>Fitness Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d0d0d;color:#f0ece4;font-family:'Noto Sans Thai','Kanit',sans-serif;min-height:100vh;overscroll-behavior:none}
input,select,button{font-family:inherit}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.wrap{max-width:480px;margin:0 auto;padding:20px 14px 80px}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.title{font-family:Kanit;font-weight:900;font-size:22px;letter-spacing:-0.5px;line-height:1.1}
.subtitle{color:#555;font-size:11px;margin-top:2px}
.search-row{display:flex;gap:8px;margin-bottom:8px}
.count{color:#555;font-size:12px;margin-bottom:12px}
input{background:#1a1a1a;border:1.5px solid #2a2a2a;border-radius:10px;color:#f0ece4;padding:11px 14px;font-size:15px;width:100%;outline:none;transition:border .15s}
input:focus{border-color:#c8f044}
.btn-p{background:#c8f044;color:#0d0d0d;border:none;border-radius:12px;padding:12px 20px;font-weight:700;font-size:15px;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-p:active{background:#b8e034}
.btn-g{background:transparent;color:#f0ece4;border:1.5px solid #333;border-radius:12px;padding:11px 18px;font-weight:600;font-size:14px;cursor:pointer;transition:border .15s}
.btn-g:active{border-color:#666}
.btn-d{background:transparent;color:#ff6666;border:1.5px solid #ff444433;border-radius:12px;padding:11px 18px;font-weight:600;font-size:14px;cursor:pointer;width:100%}
.card{background:#141414;border:1.5px solid #1e1e1e;border-radius:16px;padding:14px 16px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.card:active{border-color:#c8f04460;background:#181818}
.card-name{font-family:Kanit;font-weight:700;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-sub{color:#666;font-size:12px;margin-top:2px}
.card-right{text-align:right;margin-left:10px;flex-shrink:0}
.card-num{font-family:Kanit;font-size:22px;font-weight:900;line-height:1}
.card-numlabel{color:#666;font-size:10px}
.progress{margin-top:10px;background:#222;border-radius:99px;height:4px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;transition:width .4s}
.panel{background:#141414;border:1.5px solid #1e1e1e;border-radius:18px;padding:20px;margin-bottom:14px}
.stat-row{display:flex;gap:10px;margin-bottom:16px}
.stat{flex:1;background:#1a1a1a;border-radius:12px;padding:12px 8px;text-align:center}
.stat-num{font-family:Kanit;font-size:24px;font-weight:900;line-height:1}
.stat-label{color:#666;font-size:11px;margin-top:2px}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:#1a1a1a;border-radius:10px;margin-bottom:8px}
.hist-date{font-size:13px;font-weight:600}
.hist-num{color:#555;font-size:12px;margin-left:8px}
.hist-del{background:none;border:none;color:#ff6666;cursor:pointer;font-size:16px;padding:0 4px}
.hist-list{max-height:280px;overflow-y:auto}
.field-label{font-size:13px;color:#aaa;margin-bottom:6px}
.field{margin-bottom:14px}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 24px;border-radius:40px;font-weight:700;font-size:14px;box-shadow:0 4px 24px #0006;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.flex-row{display:flex;gap:10px}
.empty{text-align:center;color:#555;margin-top:40px;font-size:14px}
.panel-title{font-family:Kanit;font-weight:700;font-size:18px;margin-bottom:4px}
.panel-sub{color:#888;font-size:13px;margin-bottom:18px}
.remain-box{background:#1a1a1a;border-radius:12px;padding:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:0}
.remain-label{color:#888;font-size:13px}
.remain-val{font-family:Kanit;font-weight:700;color:#c8f044}
.top-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
</style>
</head>

// Load from localStorage or use initial
function loadMembers() {
  try {
    const saved = localStorage.getItem('fitness_members');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(INITIAL_DATA));
}

function saveMembers(members) {
  try { localStorage.setItem('fitness_members', JSON.stringify(members)); } catch(e) {}
}

let members = loadMembers();
let view = 'list';
let selected = null;
let searchVal = '';
let checkinDate = getTodayStr();
let editTotal = 0, editUsed = 0;
let newName = '', newSessions = 20;

function getTodayStr() { return new Date().toISOString().split('T')[0]; }

function formatDateTH(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? '#ff4444' : '#c8f044';
  t.style.color = type === 'error' ? '#fff' : '#0d0d0d';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setView(v, m) {
  view = v;
  if (m) selected = m;
  if (v === 'checkin') checkinDate = getTodayStr();
  if (v === 'editSessions' && selected) { editTotal = selected.totalSessions; editUsed = selected.usedSessions; }
  render();
}

function getSelected() { return members.find(m => m.id === selected.id) || selected; }

function doCheckin() {
  if (!checkinDate) return;
  const m = getSelected();
  if (m.history.includes(checkinDate)) { showToast('วันนี้เช็คอินไปแล้ว!', 'error'); return; }
  if (m.usedSessions >= m.totalSessions) { showToast('ครั้งหมดแล้ว!', 'error'); return; }
  members = members.map(x => x.id !== m.id ? x : { ...x, usedSessions: x.usedSessions + 1, history: [...x.history, checkinDate].sort() });
  saveMembers(members);
  showToast('เช็คอิน ' + m.name + ' สำเร็จ! 🎉');
  setView('list');
}

function doUncheckin(memberId, date) {
  members = members.map(m => m.id !== memberId ? m : { ...m, usedSessions: Math.max(0, m.usedSessions - 1), history: m.history.filter(d => d !== date) });
  saveMembers(members);
  showToast('ยกเลิกเช็คอินแล้ว');
  setView('detail', getSelected());
}

function doAddMember() {
  const name = document.getElementById('new-name').value.trim();
  const sessions = parseInt(document.getElementById('new-sessions').value) || 20;
  if (!name) { showToast('กรุณากรอกชื่อ', 'error'); return; }
  const newM = { id: Date.now(), name, totalSessions: sessions, usedSessions: 0, history: [] };
  members = [newM, ...members];
  saveMembers(members);
  showToast('เพิ่มสมาชิก ' + name + ' แล้ว 🎉');
  setView('list');
}

function doSaveEdit() {
  const total = parseInt(document.getElementById('edit-total').value) || 1;
  const used = Math.min(parseInt(document.getElementById('edit-used').value) || 0, total);
  members = members.map(m => m.id !== selected.id ? m : { ...m, totalSessions: total, usedSessions: used });
  saveMembers(members);
  showToast('บันทึกแล้ว ✓');
  setView('list');
}

function doDelete(id) {
  if (!confirm('ลบสมาชิกนี้?')) return;
  members = members.filter(m => m.id !== id);
  saveMembers(members);
  showToast('ลบสมาชิกแล้ว');
  setView('list');
}

function updateRemain() {
  const t = parseInt(document.getElementById('edit-total')?.value) || 0;
  const u = parseInt(document.getElementById('edit-used')?.value) || 0;
  const el = document.getElementById('remain-val');
  if (el) el.textContent = Math.max(0, t - u) + ' ครั้ง';
}

function renderList() {
  const filtered = members.filter(m => m.name.toLowerCase().includes(searchVal.toLowerCase()));
  let cards = filtered.map(m => {
    const rem = m.totalSessions - m.usedSessions;
    const pct = m.totalSessions > 0 ? Math.min(100, (m.usedSessions / m.totalSessions) * 100) : 0;
    const low = rem <= 3;
    return `<div class="card" onclick="setView('detail', members.find(x=>x.id===${m.id}))">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div class="card-name">${m.name}</div>
          <div class="card-sub">มาแล้ว ${m.usedSessions} ครั้ง</div>
        </div>
        <div class="card-right" style="display:flex;align-items:center;gap:10px">
          <div>
            <div class="card-num" style="color:${low ? '#ff6b6b' : '#c8f044'}">${rem}</div>
            <div class="card-numlabel">คงเหลือ</div>
          </div>
          <button class="btn-p" style="padding:7px 14px;font-size:13px;border-radius:10px" onclick="event.stopPropagation();setView('checkin',members.find(x=>x.id===${m.id}))">✓</button>
        </div>
      </div>
      <div class="progress"><div class="progress-bar" style="width:${pct}%;background:${low ? '#ff6b6b' : '#c8f044'}"></div></div>
    </div>`;
  }).join('');
  return `
    <div class="hdr">
      <div>
        <div class="title">💪 FITNESS CHECK-IN</div>
        <div class="subtitle">สมาชิกทั้งหมด ${members.length} คน</div>
      </div>
    </div>
    <div class="search-row">
      <input id="search-input" placeholder="🔍 ค้นหาสมาชิก..." value="${searchVal.replace(/"/g,'&quot;')}" oninput="searchVal=this.value;render()" />
      <button class="btn-p" style="font-size:13px;padding:11px 16px" onclick="setView('addMember')">+ เพิ่ม</button>
    </div>
    <div class="count">แสดง ${filtered.length} คน</div>
    <div id="list-items">${cards || '<div class="empty">ไม่พบสมาชิก</div>'}</div>`;
}

  const m = getSelected();
  const rem = m.totalSessions - m.usedSessions;
  return `
    <div class="hdr"><button class="btn-g" style="padding:8px 14px;font-size:13px" onclick="setView('list')">← กลับ</button><div class="title" style="font-size:18px">เช็คอิน</div></div>
    <div class="panel">
      <div style="font-size:12px;color:#777;margin-bottom:4px">เช็คอินสำหรับ</div>
      <div style="font-family:Kanit;font-weight:700;font-size:20px;margin-bottom:18px">${m.name}</div>
      <div class="field">
        <div class="field-label">วันที่เช็คอิน (เลือกย้อนหลังได้)</div>
        <input type="date" id="checkin-date" value="${checkinDate}" max="${getTodayStr()}" oninput="checkinDate=this.value" />
      </div>
      <div class="stat-row" style="margin-bottom:18px">
        <div class="stat"><div class="stat-num" style="color:#c8f044">${m.usedSessions}</div><div class="stat-label">มาแล้ว</div></div>
        <div class="stat"><div class="stat-num" style="color:${rem <= 3 ? '#ff6b6b' : '#f0ece4'}">${rem}</div><div class="stat-label">คงเหลือ</div></div>
        <div class="stat"><div class="stat-num" style="color:#888">${m.totalSessions}</div><div class="stat-label">ทั้งหมด</div></div>
      </div>
      <div class="flex-row">
        <button class="btn-g" style="flex:1" onclick="setView('list')">ยกเลิก</button>
        <button class="btn-p" style="flex:2" onclick="doCheckin()">✓ ยืนยันเช็คอิน</button>
      </div>
    </div>`;
}

  const m = getSelected();

      </div>
      <div class="stat-row">
        <div class="stat"><div class="stat-num" style="color:#c8f044">${m.usedSessions}</div><div class="stat-label">มาแล้ว</div></div>
        <div class="stat"><div class="stat-num" style="color:${rem<=3?'#ff6b6b':'#f0ece4'}">${rem}</div><div class="stat-label">คงเหลือ</div></div>

    </div>
    <div class="panel">
      <div style="font-family:Kanit;font-weight:700;margin-bottom:12px">ประวัติ (${m.history.length} ครั้ง)</div>
      <div class="hist-list">${histHtml || '<div style="color:#555;font-size:13px">ยังไม่มีประวัติ</div>'}</div>
    </div>
    <button class="btn-d" onclick="doDelete(${m.id})">🗑 ลบสมาชิก</button>`;
}

function renderAddMember() {
  return `
    <div class="hdr"><button class="btn-g" style="padding:8px 14px;font-size:13px" onclick="setView('list')">← กลับ</button><div class="title" style="font-size:18px">เพิ่มสมาชิก</div></div>
    <div class="panel">
      <div class="field">
        <div class="field-label">ชื่อ-นามสกุล</div>
        <input id="new-name" placeholder="กรอกชื่อสมาชิก" />
      </div>
      <div class="field">
        <div class="field-label">จำนวนครั้งทั้งหมด</div>
        <input id="new-sessions" type="number" min="1" value="20" />
      </div>
      <div class="flex-row" style="margin-top:6px">
        <button class="btn-g" style="flex:1" onclick="setView('list')">ยกเลิก</button>
        <button class="btn-p" style="flex:2" onclick="doAddMember()">+ เพิ่มสมาชิก</button>
      </div>
    </div>`;
}

function renderEdit() {
  const m = getSelected();
  return `
    <div class="hdr"><button class="btn-g" style="padding:8px 14px;font-size:13px" onclick="setView('detail',members.find(x=>x.id===${m.id}))">← กลับ</button><div class="title" style="font-size:18px">แก้ไขครั้ง</div></div>
    <div class="panel">
      <div class="panel-title">${m.name}</div>
      <div class="panel-sub">แก้ไขจำนวนครั้ง</div>
      <div class="field">
        <div class="field-label">จำนวนครั้งทั้งหมด</div>
        <input id="edit-total" type="number" min="1" value="${editTotal}" oninput="updateRemain()" />
      </div>
      <div class="field">
        <div class="field-label">ครั้งที่ใช้ไปแล้ว</div>
        <input id="edit-used" type="number" min="0" value="${editUsed}" oninput="updateRemain()" />
      </div>
      <div class="remain-box" style="margin-bottom:0">
        <span class="remain-label">ครั้งคงเหลือ</span>
        <span class="remain-val" id="remain-val">${Math.max(0, editTotal - editUsed)} ครั้ง</span>
      </div>
      <div class="flex-row" style="margin-top:16px">
        <button class="btn-g" style="flex:1" onclick="setView('detail',members.find(x=>x.id===${m.id}))">ยกเลิก</button>
        <button class="btn-p" style="flex:2" onclick="doSaveEdit()">บันทึก</button>
      </div>
    </div>`;
}

function render() {
  const app = document.getElementById('app');
  if (!app) return;
  switch(view) {
    case 'list': app.innerHTML = renderList(); document.getElementById('search-input')?.focus(); break;
    case 'checkin': app.innerHTML = renderCheckin(); break;
    case 'detail': app.innerHTML = renderDetail(); break;
    case 'addMember': app.innerHTML = renderAddMember(); break;
    case 'editSessions': app.innerHTML = renderEdit(); break;
  }
}

render();
</script>
</body>
</html>
