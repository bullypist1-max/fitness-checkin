const toDateKey = (d) => d.toISOString().slice(0,10);
const toThaiDate = (d) => d.toLocaleDateString("th-TH",{year:"numeric",month:"long",day:"numeric"});

function App() {
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [counts, setCounts] = useState(() => Object.fromEntries(MEMBERS.map(m=>[m.name,m.count])));
  const [logByDate, setLogByDate] = useState({});
  const [toast, setToast] = useState("");
  const [tab, setTab] = useState("checkin");
  const [selectedDate, setSelectedDate] = useState(() => toDateKey(new Date()));
  const [syncing, setSyncing] = useState(false);
  const [syncStatus, setSyncStatus] = useState("");
  const isToday = selectedDate === toDateKey(new Date());
  const todaySet = logByDate[selectedDate] || {};

  // โหลดข้อมูลจาก Google Sheets
  const loadFromSheet = useCallback(async (date) => {
    setSyncing(true);
    try {
      const res = await fetch(API_URL + "?action=getLog&date=" + date);
      const data = await res.json();
      if (data.log) {
        setLogByDate(l => ({...l, [date]: data.log}));
        // อัปเดต counts จากชีท
        const newCounts = {};
        Object.entries(data.log).forEach(([name, info]) => {
          if (info.count) newCounts[name] = info.count;
        });
        if (Object.keys(newCounts).length > 0) {
          setCounts(c => ({...c, ...newCounts}));
        }
      }
      setSyncStatus("✓ ซิงค์แล้ว " + new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}));
    } catch(e) {
      setSyncStatus("⚠️ ไม่มีอินเทอร์เน็ต");
    }
    setSyncing(false);
  }, []);

  // โหลดตอนเปิดแอปและเปลี่ยนวันที่
  useEffect(() => {
    loadFromSheet(selectedDate);
  }, [selectedDate, loadFromSheet]);

  // โหลดซ้ำทุก 30 วินาที (เรียลไทม์)
  useEffect(() => {
    const interval = setInterval(() => loadFromSheet(selectedDate), 30000);
    return () => clearInterval(interval);
  }, [selectedDate, loadFromSheet]);

  const results = useMemo(()=>{
    if(!search.trim()) return [];
    const q=search.toLowerCase();
    return MEMBERS.filter(m=>m.name.toLowerCase().includes(q)).slice(0,8);
  },[search]);

  function pick(m){ setSelected(m); setSearch(m.name); }

  async function checkin(){
    if(!selected||todaySet[selected.name]) return;
    const name=selected.name;
    const n=(counts[name]||0)+1;
    const timeStr=isToday?new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}):"(ย้อนหลัง)";
    // อัปเดต state ทันที (ไม่รอ server)
    setCounts(c=>({...c,[name]:n}));
    setLogByDate(l=>({...l,[selectedDate]:{...(l[selectedDate]||{}),[name]:{time:timeStr,count:n}}}));
    setToast("เช็คชื่อ "+name+" สำเร็จ! ครั้งที่ "+n);
    setTimeout(()=>setToast(""),3000);
    setSearch(""); setSelected(null);
    // บันทึกลง Google Sheets
    try {
      await fetch(API_URL, {
        method:"POST",
        body: JSON.stringify({action:"checkin", name, date:selectedDate, time:timeStr, count:n})
      });
      setSyncStatus("✓ บันทึกแล้ว " + new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}));
    } catch(e) {
      setSyncStatus("⚠️ บันทึกไม่ได้ (ไม่มีอินเทอร์เน็ต)");
    }
  }

  const todayList=Object.keys(todaySet);
  const bg="linear-gradient(135deg,#0f0c29,#302b63,#24243e)";
  const done=(name)=>!!todaySet[name];
  const getTime=(name)=>todaySet[name]?.time||todaySet[name]||"";
  const displayDate = toThaiDate(new Date(selectedDate+"T00:00:00"));

  return(
    <div style={{minHeight:"100vh",background:bg,fontFamily:"'Noto Sans Thai',sans-serif",color:"#fff"}}>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"#38ef7d",color:"#000",padding:"12px 20px",borderRadius:12,fontWeight:700,fontSize:13,zIndex:999,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>{toast}</div>}

            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
              <span style={{fontSize:11,color:"rgba(255,255,255,0.45)"}}>{displayDate}</span>
              <input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)}
                style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:6,color:"#fff",fontSize:11,padding:"2px 6px",fontFamily:"inherit",outline:"none"}}/>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{background:"linear-gradient(135deg,#f093fb,#f5576c)",borderRadius:20,padding:"5px 12px",fontSize:12,fontWeight:700,marginBottom:4}}>วันนี้ {todayList.length} คน</div>
            <div style={{fontSize:10,color:syncStatus.includes("⚠️")?"#f5576c":"#38ef7d",textAlign:"right"}}>{syncing?"⏳ กำลังโหลด...":syncStatus}</div>
          </div>
        </div>
        <div style={{display:"flex"}}>
          {[["checkin","🏃 เช็คชื่อ"],["today","📋 วันนี้ ("+todayList.length+")"],["all","👥 ทั้งหมด"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"9px 0",border:"none",background:"transparent",color:tab===k?"#f093fb":"rgba(255,255,255,0.4)",fontWeight:tab===k?700:400,borderBottom:tab===k?"2px solid #f093fb":"2px solid transparent",fontSize:12,fontFamily:"inherit",cursor:"pointer"}}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"18px 16px",maxWidth:560,margin:"0 auto"}}>
        {tab==="checkin"&&(
          <div>
            <div style={{position:"relative",marginBottom:14}}>
              <input value={search} onChange={e=>{setSearch(e.target.value);setSelected(null);}} placeholder="พิมพ์ชื่อสมาชิก..."
                style={{width:"100%",padding:"13px 44px 13px 14px",background:"rgba(255,255,255,0.09)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}
                onFocus={e=>e.target.style.borderColor="#f093fb"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.15)"}/>
              <span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)"}}>🔍</span>
            </div>
            {results.length>0&&!selected&&(
              <div style={{background:"rgba(255,255,255,0.06)",borderRadius:12,overflow:"hidden",border:"1px solid rgba(255,255,255,0.1)",marginBottom:14}}>
                {results.map((m,i)=>(
                  <div key={i} onClick={()=>pick(m)} style={{padding:"12px 14px",borderBottom:i<results.length-1?"1px solid rgba(255,255,255,0.06)":"none",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(240,147,251,0.1)"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{width:34,height:34,borderRadius:"50%",background:done(m.name)?"linear-gradient(135deg,#11998e,#38ef7d)":"linear-gradient(135deg,#667eea,#764ba2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>{m.name[0]}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.name}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{m.section}</div>
                    </div>
                    <div>{done(m.name)?<span style={{fontSize:11,background:"rgba(56,239,125,0.2)",color:"#38ef7d",padding:"2px 8px",borderRadius:8}}>เช็คแล้ว</span>:<span style={{fontSize:12,color:"rgba(255,255,255,0.45)"}}>{counts[m.name]} ครั้ง</span>}</div>
                  </div>
                ))}
              </div>
            )}
            {selected&&(
              <div style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(240,147,251,0.3)",borderRadius:18,padding:18,marginBottom:14}}>
                <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:14}}>
                  <div style={{width:50,height:50,borderRadius:14,background:done(selected.name)?"linear-gradient(135deg,#11998e,#38ef7d)":"linear-gradient(135deg,#f093fb,#f5576c)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:700}}>{selected.name[0]}</div>
                  <div><div style={{fontWeight:700,fontSize:15}}>{selected.name}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.45)"}}>{selected.section}</div></div>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:14}}>
                  <div style={{flex:1,background:"rgba(255,255,255,0.05)",borderRadius:10,padding:12,textAlign:"center"}}>
                    <div style={{fontSize:24,fontWeight:800,color:"#f093fb"}}>{counts[selected.name]}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>ครั้งสะสม</div>
                  </div>
                  <div style={{flex:1,background:"rgba(255,255,255,0.05)",borderRadius:10,padding:12,textAlign:"center"}}>
                    {(()=>{const base=REMAINING_OVERRIDE[selected.name]!==undefined?REMAINING_OVERRIDE[selected.name]:20-(counts[selected.name]%20===0&&counts[selected.name]>0?20:counts[selected.name]%20);const sessionsAdded=counts[selected.name]-MEMBERS.find(m=>m.name===selected.name).count;const rem=base-sessionsAdded;const color=rem<=3?"#f5576c":rem<=7?"#f093fb":"#38ef7d";return(<><div style={{fontSize:24,fontWeight:800,color}}>{rem}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>ครั้งคงเหลือ</div></>);})()}
                  </div>
                  <div style={{flex:1,background:"rgba(255,255,255,0.05)",borderRadius:10,padding:12,textAlign:"center"}}>
                    {done(selected.name)?<><div style={{fontSize:20,fontWeight:800,color:"#38ef7d"}}>✓</div><div style={{fontSize:11,color:"#38ef7d"}}>เช็คแล้ว {getTime(selected.name)}</div></>:<><div style={{fontSize:20,color:"rgba(255,255,255,0.25)"}}>—</div><div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>ยังไม่เช็ควันนี้</div></>}
                  </div>
                </div>
                <button onClick={checkin} disabled={done(selected.name)} style={{width:"100%",padding:13,background:done(selected.name)?"rgba(255,255,255,0.08)":"linear-gradient(135deg,#f093fb,#f5576c)",border:"none",borderRadius:12,color:done(selected.name)?"rgba(255,255,255,0.3)":"#fff",fontSize:15,fontWeight:700,cursor:done(selected.name)?"default":"pointer",fontFamily:"inherit"}}>
                  {done(selected.name)?"✓ เช็คชื่อแล้ววันนี้":"✅ เช็คชื่อเทรน"}
                </button>
              </div>
            )}
            {search&&results.length===0&&!selected&&<div style={{textAlign:"center",color:"rgba(255,255,255,0.3)",padding:"40px 0",fontSize:13}}>ไม่พบชื่อ "{search}"</div>}
          </div>
        )}

        {tab==="today"&&(
          <div>
            {todayList.length===0
              ?<div style={{textAlign:"center",padding:"60px 0",color:"rgba(255,255,255,0.25)"}}><div style={{fontSize:44,marginBottom:10}}>📋</div>ยังไม่มีการเช็คชื่อวันนี้</div>
              :todayList.map((name,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"rgba(56,239,125,0.08)",border:"1px solid rgba(56,239,125,0.2)",borderRadius:12,padding:"12px 14px",marginBottom:8}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#11998e,#38ef7d)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{i+1}</div>
                  <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{name}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>เช็คชื่อ {getTime(name)}</div></div>
                  <div style={{fontSize:13,color:"#38ef7d",fontWeight:700}}>{counts[name]} ครั้ง</div>
                </div>
              ))}
          </div>
        )}

        {tab==="all"&&(
          <div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:12}}>สมาชิกทั้งหมด {MEMBERS.length} คน</div>
            {[...MEMBERS].sort((a,b)=>{
              if(done(a.name)&&!done(b.name)) return -1;
              if(!done(a.name)&&done(b.name)) return 1;
              return counts[b.name]-counts[a.name];
            }).map((m,i)=>(
              <div key={i} onClick={()=>{setTab("checkin");pick(m);}} style={{display:"flex",alignItems:"center",gap:10,background:done(m.name)?"rgba(56,239,125,0.07)":"rgba(255,255,255,0.03)",border:"1px solid "+(done(m.name)?"rgba(56,239,125,0.2)":"rgba(255,255,255,0.07)"),borderRadius:10,padding:"11px 12px",marginBottom:6,cursor:"pointer"}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:done(m.name)?"linear-gradient(135deg,#11998e,#38ef7d)":"linear-gradient(135deg,#667eea,#764ba2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{m.name[0]}</div>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.name}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.35)"}}>{m.section}</div></div>
                <div style={{fontSize:12,color:done(m.name)?"#38ef7d":"rgba(255,255,255,0.4)",fontWeight:700}}>{done(m.name)?"✓":counts[m.name]}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800&display=swap');*{box-sizing:border-box}`}</style>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
